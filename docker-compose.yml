services:
  secureops-portal:
    build: .
    image: hacktify/secureops-portal:1.0
    container_name: secureops-portal
    ports:
      - "8088:8088"
      - "5000:5000"
      - "3306:3306"
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - secureops-net

networks:
  secureops-net:
    driver: bridge